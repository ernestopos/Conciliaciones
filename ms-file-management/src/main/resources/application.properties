spring.application.name=ms-file-management
server.port=8081

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/conciliaciones
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Security - JWT / Keycloak placeholder
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/conciliaciones

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.conciliaciones=INFO
