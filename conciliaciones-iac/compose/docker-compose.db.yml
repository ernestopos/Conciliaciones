version: '3.9'

services:
  postgres:
    image: postgres:latest
    container_name: bd_conciliaciones
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - conciliaciones_postgres_data:/var/lib/postgresql
      - ../docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - conciliaciones_net

volumes:
  conciliaciones_postgres_data:

networks:
  conciliaciones_net:
    driver: bridge