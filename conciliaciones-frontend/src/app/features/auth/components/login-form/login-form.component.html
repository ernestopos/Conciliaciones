<mat-card class="card">
  <h1>Conciliaciones</h1>
  <p>Portal administrativo de conciliación financiera</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form">
    <mat-form-field appearance="outline">
      <mat-label>Usuario</mat-label>
      <input
        matInput
        formControlName="username"
        placeholder="Ingrese su usuario"
        autocomplete="username"
      />
      <mat-icon matSuffix>person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Contraseña</mat-label>
      <input
        matInput
        [type]="hidePassword ? 'password' : 'text'"
        formControlName="password"
        placeholder="Ingrese su contraseña"
        autocomplete="current-password"
      />
      <button
        mat-icon-button
        type="button"
        matSuffix
        (click)="hidePassword = !hidePassword"
        [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'"
      >
        <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
      </button>
    </mat-form-field>

    <app-captcha (validityChanged)="captchaValid = $event" />

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="form.invalid || !captchaValid || loading"
    >
      {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
    </button>
  </form>

  <small>Acceda con su usuario y contraseña asignados</small>
</mat-card>
