<mat-card class="card">
  <h1>Conciliaciones</h1>
  <p>Portal administrativo de conciliación financiera</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form">
    <mat-form-field appearance="outline">
      <mat-label>Correo</mat-label>
      <input matInput formControlName="username" />
      <mat-icon matSuffix>mail</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Contraseña</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
      <button mat-icon-button type="button" matSuffix (click)="hidePassword = !hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
      </button>
    </mat-form-field>

    <app-captcha (validityChanged)="captchaValid = $event" />

    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || !captchaValid || loading">
      {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
    </button>
  </form>

  <small>Demo: admin&#64;conciliaciones.com / Admin123*</small>
</mat-card>
