<app-page-header title="Ejecuciones de procesamiento" subtitle="Entidad execution_plan_task (JPA)" />
<app-search-filter-bar (filterChange)="applyFilter($event)" />

@if (loading) {
  <app-loading-spinner />
} @else if (!filtered.length) {
  <app-empty-state title="Sin ejecuciones" description="No hay planes de tareas ejecutados para mostrar." />
} @else {
  <div class="table-wrapper">
    <table mat-table [dataSource]="filtered">
      @for (column of columns; track column) {
        <ng-container [matColumnDef]="column">
          <th mat-header-cell *matHeaderCellDef>{{ headers[column] ?? column }}</th>
          <td mat-cell *matCellDef="let row">
            @if (column === 'id') {
              <a class="execution-link" [routerLink]="['/conciliacion/processing-executions', row.id]">
                {{ row.id }}
              </a>
            } @else {
              {{ displayValue(row, column) }}
            }
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}
