<mat-nav-list>
  <ng-container *ngFor="let item of items">
    <a mat-list-item *ngIf="!item.children?.length" [routerLink]="item.route" routerLinkActive="active-link">
      <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
      <span matListItemTitle>{{ item.label }}</span>
    </a>

    <mat-expansion-panel *ngIf="item.children?.length" class="menu-group">
      <mat-expansion-panel-header>
        <mat-panel-title><mat-icon>{{ item.icon }}</mat-icon>{{ item.label }}</mat-panel-title>
      </mat-expansion-panel-header>
      <a mat-list-item *ngFor="let child of item.children" [routerLink]="child.route" routerLinkActive="active-link">
        <mat-icon matListItemIcon>{{ child.icon }}</mat-icon>
        <span matListItemTitle>{{ child.label }}</span>
      </a>
    </mat-expansion-panel>
  </ng-container>
</mat-nav-list>
