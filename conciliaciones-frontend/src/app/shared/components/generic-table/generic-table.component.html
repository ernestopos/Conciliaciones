<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort>
    <ng-container *ngFor="let column of displayedColumns; trackBy: trackByColumn" [matColumnDef]="column">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ headers[column] ?? column }}</th>
      <td mat-cell *matCellDef="let row">{{ displayValue(row, column) }}</td>
    </ng-container>

    <ng-container matColumnDef="actions" *ngIf="actions.length">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row" class="actions-cell">
        <button *ngFor="let action of actions" mat-icon-button type="button" [color]="action.color ?? 'primary'" [attr.aria-label]="action.label" (click)="action.callback(row)">
          <mat-icon>{{ action.icon ?? 'play_arrow' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="renderedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: renderedColumns"></tr>
  </table>

  <mat-paginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
</div>
